services:
  db:
    image: postgres:16
    restart: always
    container_name: rsu-port-db
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rsu-port-backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/backend/app

volumes:
  pgdata:
